{% extends "base.html" %}
{% block title %}Quizzes{% endblock %}

{% block content %}

<div class="header">
    <h1>All Quizzes</h1>

    <button class="btn-add" onclick="location.href='{{ url_for('new_quiz') }}'">
        + Add Quiz
    </button>
</div>

<input type="text" class="search-bar" placeholder="Search quizzes...">

<div class="quiz-grid">

    {% if quizzes %}
    {% for q in quizzes %}
    <div class="quiz-card">
        <h3>{{ q.title }}</h3>

        <p>Subject: {{ q.subject }}</p>
        <p>Questions: {{ q.question_count }}</p>

        <div class="card-actions">
        
            <button onclick="location.href='{{ url_for('view_quiz', id=q.id) }}'" class="btn btn-view">
                View
            </button>
        
            <button class="btn btn-edit" onclick="location.href='{{ url_for('edit_quiz', id=q.id) }}'">
                Edit
            </button>
        
            <form method="POST" action="{{ url_for('delete_quiz', id=q.id) }}" style="display:inline;"
                onsubmit="return confirm('Delete this quiz?');">
        
                <button class="btn btn-delete">Delete</button>
            </form>
        
        </div>
    </div>
    {% endfor %}
    {% else %}
    <p>No quizzes found</p>
    {% endif %}

</div>

{% endblock %}
