{% extends "base.html" %}
{% block title %}Edit Question{% endblock %}

{% block content %}

<div class="container">

    <div class="header">
        <div>
            <h1>Edit Question</h1>
            <p class="subtitle">Update this question</p>
        </div>
    </div>

    <div class="form-wrapper">

        <div class="form-card">

            <form method="POST">

                <div class="input-group">
                    <label>Question</label>
                    <textarea name="text" required>{{ question.question_text }}</textarea>
                </div>

                <div class="input-group">
                    <label>Option 1</label>
                    <input type="text" name="option1" value="{{ question.option1 }}" required>
                </div>

                <div class="input-group">
                    <label>Option 2</label>
                    <input type="text" name="option2" value="{{ question.option2 }}" required>
                </div>

                <div class="input-group">
                    <label>Option 3</label>
                    <input type="text" name="option3" value="{{ question.option3 }}" required>
                </div>

                <div class="input-group">
                    <label>Option 4</label>
                    <input type="text" name="option4" value="{{ question.option4 }}" required>
                </div>

                <div class="input-group">
                    <label>Correct Option (1–4)</label>
                    <input type="number"
                           name="correct_option"
                           min="1"
                           max="4"
                           value="{{ question.correct_option }}"
                           required>
                </div>

                <div class="input-group">
                    <label>Marks</label>
                    <input type="number" name="marks" value="{{ question.marks }}">
                </div>

                <div class="form-actions">
                    <button type="button"
                            class="btn secondary"
                            onclick="history.back()">
                        Cancel
                    </button>

                    <button type="submit" class="btn primary">
                        Update Question
                    </button>
                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
