{% extends "base.html" %}
{% block title %}Subjects{% endblock %}

{% block content %}

<div class="header">
    <h1>Subjects</h1>

    <button class="btn primary" onclick="location.href='{{ url_for('new_subject') }}'">
        + Add Subject
    </button>
</div>

<table class="table">
    <thead>
        <tr>
            <th>Name</th>
            <th>Description</th>
            <th>Quizzes</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody>
        {% if subjects %}
        {% for s in subjects %}
        <tr>
            <td>{{ s.name }}</td>
            <td>{{ s.description or "—" }}</td>
            <td>{{ s.quiz_count }}</td>
            <td>
                <button class="btn small" onclick="location.href='{{ url_for('edit_subject', id=s.id) }}'">
                    Edit
                </button>

                <form method="POST" action="{{ url_for('delete_subject', id=s.id) }}" style="display:inline;"
                    onsubmit="return confirm('Are you sure you want to delete this subject?')">
                    <button class="btn small danger">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
        {% else %}
        <tr>
            <td colspan="4">No subjects found</td>
        </tr>
        {% endif %}
    </tbody>
</table>

{% endblock %}
